[workspace]
resolver = "2"

members = [
    "crates/tier1",
    "crates/thumbrella-tier1",
    "crates/thumbrella-tier2",
]

[profile.dev]
opt-level = 1
debug = 1
incremental = true
codegen-units = 256

# Compile dependencies with full optimization so heavy crates (image, jpeg-encoder,
# ravif, etc.) run at near-release speed. They're cached after the first build so
# this only adds time on a clean build.
[profile.dev.package."*"]
opt-level = 3

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
