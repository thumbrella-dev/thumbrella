<!doctype html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>thumbrella /dev</title>
    <style>
        :root {
            --bg: #f4f6f8;
            --fg: #1e2933;
            --card: #ffffff;
            --line: #d8dee6;
            --muted: #5b6b7b;
            --accent: #1155aa;
        }
        body {
            margin: 0;
            background: linear-gradient(180deg, #eef3f8 0%, #f8fafc 60%, #f4f6f8 100%);
            color: var(--fg);
            font-family: ui-sans-serif, system-ui, sans-serif;
        }
        main {
            max-width: 760px;
            margin: 28px auto;
            padding: 0 16px;
        }
        .card {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 2px 8px rgba(20,30,40,0.06);
        }
        h1 { margin: 0 0 8px; font-size: 1.4rem; }
        p { margin: 0 0 12px; color: var(--muted); }
        code { background: #f3f6fa; padding: 2px 6px; border-radius: 4px; }
        .fields {
            display: grid;
            gap: 10px;
            margin-top: 10px;
        }
        label {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--fg);
            display: block;
            margin-bottom: 4px;
        }
        input[type="url"] {
            width: 100%;
            box-sizing: border-box;
            padding: 9px 10px;
            border: 1px solid var(--line);
            border-radius: 8px;
            font-size: 0.95rem;
        }
        input[type="url"]:focus {
            outline: 2px solid color-mix(in srgb, var(--accent) 40%, white);
            border-color: var(--accent);
        }
        .actions {
            margin-top: 14px;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        button {
            border: 0;
            background: var(--accent);
            color: #fff;
            padding: 9px 14px;
            border-radius: 8px;
            font-size: 0.95rem;
            cursor: pointer;
        }
        .hint {
            font-size: 0.86rem;
            color: var(--muted);
            margin: 0;
        }
    </style>
</head>
<body>
    <main>
        <section class="card">
            <h1>thumbrella /dev</h1>
            <p>Enter up to 5 source URLs and submit. The request is sent as repeated <code>url</code> query params.</p>
            <form method="get" action="/dev">
                <div class="fields">
                    <div>
                        <label for="url1">URL 1</label>
                        <input id="url1" name="url" type="url" placeholder="http://localhost:8001/small.jpg" />
                    </div>
                    <div>
                        <label for="url2">URL 2</label>
                        <input id="url2" name="url" type="url" placeholder="http://localhost:8001/android-with-thumb.jpg" />
                    </div>
                    <div>
                        <label for="url3">URL 3</label>
                        <input id="url3" name="url" type="url" placeholder="http://localhost:8001/progressive.jpg" />
                    </div>
                    <div>
                        <label for="url4">URL 4</label>
                        <input id="url4" name="url" type="url" placeholder="http://localhost:8001/android.avif" />
                    </div>
                    <div>
                        <label for="url5">URL 5</label>
                        <input id="url5" name="url" type="url" placeholder="http://localhost:8001/file.png" />
                    </div>
                </div>
                <div class="actions">
                    <button type="submit">Render Thumbnails</button>
                    <p class="hint">Empty fields are ignored.</p>
                </div>
            </form>
        </section>
    </main>
</body>
</html>
