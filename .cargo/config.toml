# Cargo configuration for thumbrella project

[target.x86_64-pc-windows-msvc]
# Match Rust CRT with vcpkg's x64-windows-static (/MT).
rustflags = ["-C", "target-feature=+crt-static"]

[target.x86_64-unknown-linux-gnu]
linker = "gcc"
# Use LLD (via the Rust toolchain's gcc-ld wrapper) instead of GNU ld.
# GNU ld's single-pass archive scanning fails to pull in img2dec.o from
# libavformat.a (which registers the webp_pipe demuxer) because allformats.o
# is included first and then references ff_image_webp_pipe_demuxer — GNU ld
# won't re-scan the same archive. LLD handles circular archive deps correctly.
rustflags = [
    "-C", "link-arg=-B/usr/local/rustup/toolchains/1.95.0-x86_64-unknown-linux-gnu/lib/rustlib/x86_64-unknown-linux-gnu/bin/gcc-ld",
    "-C", "link-arg=-fuse-ld=lld",
    "-C", "link-arg=-Wl,-u,ff_image_psd_pipe_demuxer",
]


# To allow Windows to work with the internal buildable ffmpeg,
# this environment variable must be set to the build path. This
# gets enabled by the `ffs/build-windows.ps1` when needed.
[env]
# VCPKG_ROOT = "workspace/thumbrella/ffs/vcpkg"
